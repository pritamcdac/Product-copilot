apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: product-app
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-app
      tier: backend
  template:
    metadata:
      labels:
        app: product-app
        tier: backend
    spec:
      containers:
        - name: backend
          image: backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_NAME
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: product-app
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: product-app
    tier: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
