
name: Frontend CI/CD

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      # - name: Run tests
      #   run: npm test -- --watchAll=false
      #   working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/product-frontend:latest .
        working-directory: frontend

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/product-frontend:latest
        working-directory: frontend
