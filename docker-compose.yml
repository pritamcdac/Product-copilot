version: '3.8'
services:
  mysql:
    build: ./mysql
    container_name: product-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: productdb
    ports:
      - "3308:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
  backend:
    build: ./backend
    container_name: product-backend
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: productdb
      DB_PORT: 3308
    ports:
      - "5000:5000"
    restart: on-failure
  frontend:
    build: ./frontend
    container_name: product-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
